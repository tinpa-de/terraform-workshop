<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terraform Workshop</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0d1117;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e6edf3;
      height: 100vh;
      overflow: hidden;
    }

    #particles-js {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #58a6ff, #bc8cff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }

    p {
      font-size: clamp(1rem, 2vw, 1.25rem);
      color: #8b949e;
      max-width: 480px;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .badge {
      display: inline-block;
      padding: 0.4rem 1rem;
      border: 1px solid #30363d;
      border-radius: 999px;
      font-size: 0.85rem;
      color: #8b949e;
      background: rgba(22, 27, 34, 0.7);
      backdrop-filter: blur(8px);
    }

    .controls {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 2;
      display: flex;
      gap: 0.5rem;
    }

    button {
      padding: 0.5rem 1rem;
      border-radius: 6px;
      border: 1px solid #30363d;
      background: rgba(22, 27, 34, 0.85);
      color: #e6edf3;
      font-size: 0.85rem;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: border-color 0.2s, background 0.2s;
    }

    button:hover {
      border-color: #58a6ff;
      background: rgba(88, 166, 255, 0.1);
    }
  </style>
</head>
<body>

  <div id="particles-js"></div>

  <div class="content">
    <h1>It's Alive! 🎉</h1>
    <p>Congrats — you just deployed a static website with Terraform.</p>
    <span class="badge">Deployed by a real Terraform wizard (that's you)</span>
  </div>

  <div class="controls">
    <button onclick="setTheme('network')">Network</button>
    <button onclick="setTheme('snow')">Snow</button>
    <button onclick="setTheme('bubble')">Bubble</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script>
    const themes = {
      network: {
        particles: {
          number: { value: 80, density: { enable: true, value_area: 800 } },
          color: { value: '#58a6ff' },
          shape: { type: 'circle' },
          opacity: { value: 0.5, random: false },
          size: { value: 3, random: true },
          line_linked: { enable: true, distance: 150, color: '#30363d', opacity: 0.4, width: 1 },
          move: { enable: true, speed: 2, direction: 'none', random: false, straight: false, out_mode: 'out', bounce: false }
        },
        interactivity: {
          detect_on: 'canvas',
          events: { onhover: { enable: true, mode: 'grab' }, onclick: { enable: true, mode: 'push' }, resize: true },
          modes: { grab: { distance: 140, line_linked: { opacity: 1 } }, push: { particles_nb: 4 } }
        },
        retina_detect: true
      },
      snow: {
        particles: {
          number: { value: 120, density: { enable: true, value_area: 800 } },
          color: { value: '#ffffff' },
          shape: { type: 'circle' },
          opacity: { value: 0.7, random: true },
          size: { value: 4, random: true },
          line_linked: { enable: false },
          move: { enable: true, speed: 1.5, direction: 'bottom', random: true, straight: false, out_mode: 'out', bounce: false }
        },
        interactivity: {
          detect_on: 'canvas',
          events: { onhover: { enable: true, mode: 'repulse' }, onclick: { enable: true, mode: 'push' }, resize: true },
          modes: { repulse: { distance: 100 }, push: { particles_nb: 6 } }
        },
        retina_detect: true
      },
      bubble: {
        particles: {
          number: { value: 40, density: { enable: true, value_area: 800 } },
          color: { value: ['#58a6ff', '#bc8cff', '#3fb950', '#f78166'] },
          shape: { type: 'circle' },
          opacity: { value: 0.3, random: true },
          size: { value: 20, random: true },
          line_linked: { enable: false },
          move: { enable: true, speed: 1, direction: 'top', random: true, straight: false, out_mode: 'out', bounce: false }
        },
        interactivity: {
          detect_on: 'canvas',
          events: { onhover: { enable: true, mode: 'bubble' }, onclick: { enable: true, mode: 'repulse' }, resize: true },
          modes: { bubble: { distance: 200, size: 40, duration: 2, opacity: 0.6 }, repulse: { distance: 200 } }
        },
        retina_detect: true
      }
    };

    function setTheme(name) {
      if (window.pJSDom && window.pJSDom.length > 0) {
        window.pJSDom[0].pJS.fn.vendors.destroypJS();
        window.pJSDom = [];
      }
      particlesJS('particles-js', themes[name]);
    }

    setTheme('network');
  </script>
</body>
</html>
