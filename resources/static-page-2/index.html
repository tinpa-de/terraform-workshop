<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terraform Workshop — Page 2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0f0a;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e6edf3;
      height: 100vh;
      overflow: hidden;
    }

    #particles-js {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #3fb950, #56d364);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }

    p {
      font-size: clamp(1rem, 2vw, 1.25rem);
      color: #7ee787;
      opacity: 0.75;
      max-width: 480px;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .badge {
      display: inline-block;
      padding: 0.4rem 1rem;
      border: 1px solid #238636;
      border-radius: 999px;
      font-size: 0.85rem;
      color: #3fb950;
      background: rgba(35, 134, 54, 0.15);
      backdrop-filter: blur(8px);
    }
  </style>
</head>
<body>

  <div id="particles-js"></div>

  <div class="content">
    <h1>Still Running? Impressive.</h1>
    <p>Your second deployment didn't blow up. At this point you're basically a DevOps engineer. Update your LinkedIn.</p>
    <span class="badge">terraform apply — 0 errors, 0 regrets</span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script>
    particlesJS('particles-js', {
      particles: {
        number: { value: 60, density: { enable: true, value_area: 800 } },
        color: { value: '#3fb950' },
        shape: { type: 'triangle' },
        opacity: { value: 0.6, random: true },
        size: { value: 5, random: true },
        line_linked: { enable: true, distance: 130, color: '#238636', opacity: 0.3, width: 1 },
        move: { enable: true, speed: 3, direction: 'none', random: true, straight: false, out_mode: 'out', bounce: false }
      },
      interactivity: {
        detect_on: 'canvas',
        events: { onhover: { enable: true, mode: 'repulse' }, onclick: { enable: true, mode: 'push' }, resize: true },
        modes: { repulse: { distance: 120 }, push: { particles_nb: 5 } }
      },
      retina_detect: true
    });
  </script>
</body>
</html>
